name: Flutter CI/CD Optimized

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Hủy các build cũ nếu có push mới cùng branch để tiết kiệm tài nguyên
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  # ─── JOB 1: CHUẨN BỊ & KIỂM TRA ────────────────────────────
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle' # Cache tự động cho Gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Tối ưu cache cho pub dependencies
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.FLUTTER_HOME }}/.pub-cache
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Create dummy .env for analysis
        run: touch .env

      - name: Static Analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit Tests
        run: flutter test --no-pub

# ─── JOB 2: BUILD ARTIFACT ────────────────────────────────
  build:
    name: 🏗️ Build Release APK
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create Environment File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEY_BASE64 }} # Kiểm tra lại tên secret của bạn
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Universal APK
        # build apk (không có split) tạo ra 1 file duy nhất cho mọi kiến trúc chip
        run: flutter build apk --release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk # Chỉ lấy 1 file này
          retention-days: 7

  # ─── JOB 3: RELEASE (CHỈ KHI CÓ TAG) ────────────────────────
  release:
    name: 🚀 Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-apk
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 🚀 Production Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/app-release.apk # Chỉ đính kèm 1 file duy nhất