name: Flutter CI/CD Optimized

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Hủy các build cũ nếu có push mới cùng branch để tiết kiệm tài nguyên
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  # ─── JOB 1: CHUẨN BỊ & KIỂM TRA ────────────────────────────
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle' # Cache tự động cho Gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Tối ưu cache cho pub dependencies
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.FLUTTER_HOME }}/.pub-cache
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Create dummy .env for analysis
        run: touch .env

      - name: Static Analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit Tests
        run: flutter test --no-pub

  # ─── JOB 2: BUILD ARTIFACTS ────────────────────────────────
  build:
    name: 🏗️ Build APK & AAB
    needs: analyze
    runs-on: ubuntu-latest
    # Chỉ build khi push vào main hoặc có tag v*
    if: github.event_name == 'push' 
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: ./.github/actions/setup-environment # (Optional) Bạn có thể tách action riêng nếu muốn tái sử dụng
        continue-on-error: true # Dùng lại setup như job analyze
        
      # Setup Java & Flutter (Copy lại từ trên nếu không tách file)
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create Environment File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build All Formats
        # Kết hợp build để giảm overhead khởi tạo
        run: |
          flutter build apk --release
          flutter build apk --split-per-abi --release
          flutter build appbundle --release

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/*-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 7 # Tự động xóa sau 7 ngày để đỡ tốn bộ nhớ

  # ─── JOB 3: RELEASE (CHỈ KHI CÓ TAG) ────────────────────────
  release:
    name: 🚀 Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-builds
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2 # Version mới nhất
        with:
          name: 🚀 Production Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true # Tự động tạo changelog từ commit
          files: |
            artifacts/app-release.apk
            artifacts/*-release.apk
            artifacts/app-release.aab