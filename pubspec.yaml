name: family_tracker
description: A family location tracking app powered by Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  # Flutter
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # Location & Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0 
  geocoding: ^2.1.1

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.2

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
